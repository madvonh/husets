openapi: 3.0.3
info:
  title: Recipe Collection API - Cosmos Connectivity Contract
  version: 1.0.0
  description: |
    Contract note for feature 002-cosmosdb-emulator-setup.
    This feature introduces no new API endpoints and no request/response schema changes.
    It tightens the runtime behavior of the existing health endpoint for Cosmos DB connectivity.

servers:
  - url: https://localhost:5001
    description: Local development
  - url: https://api.husets.example.com
    description: Production placeholder

paths:
  /health:
    get:
      summary: Health check
      description: |
        Returns healthy when the API is running and Cosmos DB is reachable.
        Returns unhealthy when Cosmos DB is configured but unreachable.
        The API process must still start successfully even when Cosmos DB is unreachable.
      operationId: getHealth
      responses:
        '200':
          description: Service and dependencies are healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Healthy
                  checks:
                    type: array
                    items:
                      type: object
                additionalProperties: true
        '503':
          description: Service started, but one or more dependencies are unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Unhealthy
                  checks:
                    type: array
                    items:
                      type: object
                additionalProperties: true

components: {}
