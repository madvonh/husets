api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: cosmosdb-uri
        value: '{{ .Env.COSMOS_CONNECTIONSTRING }}'
      - name: connectionstrings--blobs
        value: '{{ .Env.STORAGE_BLOBENDPOINT }}'
      - name: connectionstrings--cosmosdb
        value: AccountEndpoint={{ .Env.COSMOS_CONNECTIONSTRING }};Database=cosmosdb
  template:
    containers:
      - image: {{ .Image }}
        name: api
        env:
          - name: AZURE_CLIENT_ID
            value: '{{ .Env.MANAGED_IDENTITY_CLIENT_ID }}'
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: BLOBS_URI
            value: '{{ .Env.STORAGE_BLOBENDPOINT }}'
          - name: COSMOSDB_DATABASENAME
            value: cosmosdb
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: COSMOSDB_URI
            secretRef: cosmosdb-uri
          - name: ConnectionStrings__blobs
            secretRef: connectionstrings--blobs
          - name: ConnectionStrings__cosmosdb
            secretRef: connectionstrings--cosmosdb
    scale:
      minReplicas: 1
tags:
  azd-service-name: api
  aspire-resource-name: api
